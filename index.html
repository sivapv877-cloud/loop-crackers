<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Job Portal</h1>
    <div class="user-panel">
      <div class="filter-field">
        <label for="user-name">Your name</label>
        <input id="user-name" type="text" placeholder="Job seeker name" />
      </div>
      <div class="filter-field">
        <label for="user-email">Your email</label>
        <input id="user-email" type="email" placeholder="name@example.com" />
      </div>
      <div class="filter-field">
        <label for="user-role">Your role</label>
        <select id="user-role">
          <option value="job_seeker">Job Seeker</option>
          <option value="employer">Employer</option>
        </select>
      </div>
    </div>

    <div class="filter-panel">
      <div class="filter-field">
        <label for="skill-filter">Filter by skill</label>
        <input id="skill-filter" type="text" placeholder="e.g. JavaScript" />
      </div>
      <div class="filter-field">
        <label for="company-filter">Filter by company</label>
        <input id="company-filter" type="text" placeholder="e.g. Acme Inc." />
      </div>
      <button id="clear-filters">Clear filters</button>
    </div>

    <div class="status-bar">
      <span id="job-count">Loading jobs...</span>
      <button id="refresh-jobs">Refresh jobs</button>
    </div>

    <div id="application-message" class="application-message"></div>

    <section id="applications-section" class="applications-section">
      <div class="applications-header">
        <h2>Your Applications</h2>
        <span id="application-count">Loading applications...</span>
      </div>
      <div id="applications-list" class="applications-list"></div>
    </section>

    <div id="jobs-list" class="jobs-list"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
