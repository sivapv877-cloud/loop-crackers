<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Web App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Simple Web App</h1>
    <div class="form-group">
      <label for="user-input">Enter text:</label>
      <input id="user-input" type="text" placeholder="Type something..." />
    </div>
    <button id="submit-button">Show Output</button>
    <div class="output-group">
      <label for="output-area">Output:</label>
      <textarea id="output-area" readonly rows="5" placeholder="Output will appear here..."></textarea>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
